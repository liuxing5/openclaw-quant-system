name: Daily Stock Pick & Sell Signals

on:
  schedule:
    - cron: '30 6 * * 1-5'   # 北京时间 14:30 盘中初筛
    - cron: '5 7 * * 1-5'    # 北京时间 15:05 盘后定稿
    - cron: '25 1 * * 1-5'   # 北京时间 09:25 卖出决策
    - cron: '0 2 * * 1-5'    # 北京时间 10:00 盘中跟踪
    - cron: '30 2 * * 1-5'   # 北京时间 10:30 盘中跟踪
    - cron: '0 5 * * 1-5'    # 北京时间 13:00 盘中跟踪
    - cron: '30 5 * * 1-5'   # 北京时间 13:30 盘中跟踪
    - cron: '0 6 * * 1-5'    # 北京时间 14:00 盘中跟踪
  workflow_dispatch:         # 允许手动触发

jobs:
  stock-pick:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas numpy

    - name: Determine task type
      id: task
      run: |
        CURRENT_HOUR=$(date -u +%H)
        CURRENT_MIN=$(date -u +%M)
        CURRENT_TIME="${CURRENT_HOUR}${CURRENT_MIN}"

        echo "Current UTC time: ${CURRENT_TIME}"

        if [[ "$CURRENT_TIME" == "0630" ]]; then
          echo "script=zuiyou.py" >> $GITHUB_OUTPUT
          echo "title=盘中初筛 - 候选清单" >> $GITHUB_OUTPUT
        elif [[ "$CURRENT_TIME" == "0705" ]]; then
          echo "script=zuiyou.py" >> $GITHUB_OUTPUT
          echo "title=盘后定稿 - 最终决策" >> $GITHUB_OUTPUT
        else
          echo "script=sell_new.py" >> $GITHUB_OUTPUT
          echo "title=卖出决策 / 盘中跟踪" >> $GITHUB_OUTPUT
        fi

    - name: Run stock pick script
      id: run_script
      run: |
        cd recommend/xuangu
        
        echo "Running: ${{ steps.task.outputs.script }}"
        echo "Task: ${{ steps.task.outputs.title }}"
        
        python ${{ steps.task.outputs.script }} > /tmp/output.log 2>&1 || true
        
        if [ ! -s /tmp/output.log ]; then
          echo "No output from script"
          echo "has_result=false" >> $GITHUB_OUTPUT
        else
          echo "has_result=true" >> $GITHUB_OUTPUT
          echo "Output preview:"
          head -20 /tmp/output.log
        fi

    - name: Send Telegram notification
      if: steps.run_script.outputs.has_result == 'true'
      env:
        BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        TITLE="${{ steps.task.outputs.title }}"
        RUN_TIME=$(date -u '+%Y-%m-%d %H:%M UTC')
        
        # 读取输出并限制长度
        OUTPUT=$(head -c 3500 /tmp/output.log)
        
        # 构建消息
        MESSAGE="${TITLE}

运行时间: ${RUN_TIME}

\`\`\`
${OUTPUT}
\`\`\`"

        # 发送到 Telegram
        curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
          -H "Content-Type: application/json" \
          -d "{
            \"chat_id\": \"${CHAT_ID}\",
            \"text\": \"${MESSAGE//\"/\\\"}\",
            \"parse_mode\": \"MarkdownV2\",
            \"disable_web_page_preview\": true
          }" || echo "Failed to send Telegram message"

    - name: Handle script failure
      if: failure()
      env:
        BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
          -H "Content-Type: application/json" \
          -d "{
            \"chat_id\": \"${CHAT_ID}\",
            \"text\": \"⚠️ 选股任务执行失败\n\n时间: $(date -u '+%Y-%m-%d %H:%M UTC')\n任务: ${{ steps.task.outputs.title }}\n\n请检查 GitHub Actions 日志获取详细错误信息。\",
            \"parse_mode\": \"Markdown\"
          }" || echo "Failed to send error notification"
