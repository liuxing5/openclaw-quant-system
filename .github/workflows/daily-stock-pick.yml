name: Daily Stock Pick & Sell Signals

on:
  push:
    branches: [master]
    paths:
      - 'strategies/overnight_8step/**'
      - '.github/workflows/daily-stock-pick.yml'
  schedule:
    # 北京时间 09:26 卖出决策 (UTC 01:26) - 09:25竞价结束后执行
    - cron: '26 1 * * *'
    # 北京时间 09:50 实战日志补充T+1数据 (UTC 01:50)
    - cron: '50 1 * * *'
    # 北京时间 09:55 盘中跟踪 (UTC 01:55)
    - cron: '55 1 * * *'
    # 北京时间 10:25 盘中跟踪 (UTC 02:25)
    - cron: '25 2 * * *'
    # 北京时间 12:55 午间跟踪 (UTC 04:55)
    - cron: '55 4 * * *'
    # 北京时间 13:25 午后跟踪 (UTC 05:25)
    - cron: '25 5 * * *'
    # 北京时间 13:55 尾盘前跟踪 (UTC 05:55)
    - cron: '55 5 * * *'
    # 北京时间 14:35 盘中初筛 (UTC 06:35) - 过滤假突破，量比稳定，留足下单时间
    - cron: '35 6 * * *'
    # 北京时间 15:10 盘后定稿 (UTC 07:10) - 收盘后数据稳定
    - cron: '10 7 * * *'
    # 北京时间 16:00 实战日志记录 (UTC 08:00) - 记录当日推荐股票表现
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  stock-pick:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas numpy baostock python-dotenv tqdm psycopg2-binary loguru

    - name: Check if trading day
      id: check_trading
      run: |
        cd strategies/overnight_8step
        python3 -c "
        from trading_calendar import is_trading_day
        from datetime import datetime, timedelta, timezone, date
        utc_dt = datetime.now(timezone.utc)
        beijing_dt = utc_dt + timedelta(hours=8)
        beijing_date = beijing_dt.date()
        is_trading = is_trading_day(beijing_date)
        print(f'北京时间: {beijing_date} ({\"交易日\" if is_trading else \"休市日\"})')
        with open('/tmp/is_trading.txt', 'w') as f:
            f.write('true' if is_trading else 'false')
        "
        echo "is_trading=$(cat /tmp/is_trading.txt)" >> $GITHUB_OUTPUT

    - name: Skip on non-trading day
      if: steps.check_trading.outputs.is_trading == 'false'
      run: |
        echo "⏭️ 今天不是 A 股交易日，跳过执行"
        exit 0

    - name: Determine task type
      id: task
      if: steps.check_trading.outputs.is_trading == 'true'
      run: |
        CURRENT_HOUR=$(date -u +%H)
        CURRENT_MIN=$(date -u +%M)
        CURRENT_TIME="${CURRENT_HOUR}${CURRENT_MIN}"
        BEIJING_HOUR=$(( (10#$CURRENT_HOUR + 8) % 24 ))
        BEIJING_MIN=$((10#$CURRENT_MIN))
        echo "Current UTC time: ${CURRENT_TIME} (Beijing: ${BEIJING_HOUR}:${BEIJING_MIN})"
        
        # 精确匹配 cron 定时触发 (使用字符串比较避免八进制解析)
        if [[ "$CURRENT_TIME" == "0126" ]]; then
          echo "script=sell_new.py" >> $GITHUB_OUTPUT
          echo "title=⏰ 09:26 卖出决策" >> $GITHUB_OUTPUT
        elif [[ "$CURRENT_TIME" == "0150" ]]; then
          echo "script=record_trade_log.py morning" >> $GITHUB_OUTPUT
          echo "title=📝 09:50 实战日志补充T+1" >> $GITHUB_OUTPUT
        elif [[ "$CURRENT_TIME" == "0155" ]]; then
          echo "script=sell_new.py" >> $GITHUB_OUTPUT
          echo "title=📊 09:55 盘中跟踪" >> $GITHUB_OUTPUT
        elif [[ "$CURRENT_TIME" == "0225" ]]; then
          echo "script=sell_new.py" >> $GITHUB_OUTPUT
          echo "title=📊 10:25 盘中跟踪" >> $GITHUB_OUTPUT
        elif [[ "$CURRENT_TIME" == "0455" ]]; then
          echo "script=sell_new.py" >> $GITHUB_OUTPUT
          echo "title=📊 12:55 午间跟踪" >> $GITHUB_OUTPUT
        elif [[ "$CURRENT_TIME" == "0525" ]]; then
          echo "script=sell_new.py" >> $GITHUB_OUTPUT
          echo "title=📊 13:25 午后跟踪" >> $GITHUB_OUTPUT
        elif [[ "$CURRENT_TIME" == "0555" ]]; then
          echo "script=sell_new.py" >> $GITHUB_OUTPUT
          echo "title=📊 13:55 尾盘前跟踪" >> $GITHUB_OUTPUT
        elif [[ "$CURRENT_TIME" == "0635" ]]; then
          echo "script=zuiyou1.py" >> $GITHUB_OUTPUT
          echo "title=🔥 14:35 盘中初筛-候选清单" >> $GITHUB_OUTPUT
        elif [[ "$CURRENT_TIME" == "0710" ]]; then
          echo "script=zuiyou1.py" >> $GITHUB_OUTPUT
          echo "title=🎯 15:10 盘后定稿-最终决策" >> $GITHUB_OUTPUT
        elif [[ "$CURRENT_TIME" == "0800" ]]; then
          echo "script=record_trade_log.py evening" >> $GITHUB_OUTPUT
          echo "title=📝 16:00 实战日志记录推荐" >> $GITHUB_OUTPUT
        # cron-job.org 触发：根据北京时间范围智能选择 (使用算术扩展避免八进制解析)
        elif (( BEIJING_HOUR >= 9 && BEIJING_HOUR < 10 )); then
          echo "script=sell_new.py" >> $GITHUB_OUTPUT
          echo "title=⏰ 早盘卖出决策" >> $GITHUB_OUTPUT
        elif (( BEIJING_HOUR >= 10 && BEIJING_HOUR < 14 )); then
          echo "script=sell_new.py" >> $GITHUB_OUTPUT
          echo "title=📊 盘中持仓跟踪" >> $GITHUB_OUTPUT
        elif (( BEIJING_HOUR >= 14 && BEIJING_HOUR < 15 )); then
          echo "script=zuiyou1.py" >> $GITHUB_OUTPUT
          echo "title=🔥 14:${BEIJING_MIN} 盘中选股初筛" >> $GITHUB_OUTPUT
        elif (( BEIJING_HOUR == 15 && BEIJING_MIN >= 10 )); then
          echo "script=zuiyou1.py" >> $GITHUB_OUTPUT
          echo "title=🎯 15:10+ 盘后选股定稿" >> $GITHUB_OUTPUT
        elif (( BEIJING_HOUR == 15 && BEIJING_MIN < 10 )); then
          echo "script=zuiyou1.py" >> $GITHUB_OUTPUT
          echo "title=📊 15:0x 盘中选股初筛" >> $GITHUB_OUTPUT
        elif (( BEIJING_HOUR >= 15 )); then
          echo "script=zuiyou1.py" >> $GITHUB_OUTPUT
          echo "title=🎯 盘后选股定稿" >> $GITHUB_OUTPUT
        else
          echo "script=zuiyou1.py" >> $GITHUB_OUTPUT
          echo "title=🔍 非交易时段测试" >> $GITHUB_OUTPUT
        fi
        
        echo "Task determined: script=${{ steps.task.outputs.script }}, title=${{ steps.task.outputs.title }}"

    - name: Run stock pick script
      id: run_script
      working-directory: strategies/overnight_8step
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        POSTGRES_HOST: ${{ secrets.SUPABASE_HOST }}
        POSTGRES_PORT: ${{ secrets.SUPABASE_PORT }}
        POSTGRES_USER: ${{ secrets.SUPABASE_USER }}
        POSTGRES_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
        POSTGRES_DB: ${{ secrets.SUPABASE_DB }}
      run: |
        echo "Running: ${{ steps.task.outputs.script }}"
        python ${{ steps.task.outputs.script }} > /tmp/output.log 2>&1
        EXIT_CODE=$?
        
        if [ $EXIT_CODE -ne 0 ]; then
          echo "Script failed with exit code: $EXIT_CODE"
          echo "has_result=false" >> $GITHUB_OUTPUT
          echo "script_failed=true" >> $GITHUB_OUTPUT
        elif [ ! -s /tmp/output.log ]; then
          echo "No output from script"
          echo "has_result=false" >> $GITHUB_OUTPUT
          echo "script_failed=false" >> $GITHUB_OUTPUT
        else
          echo "has_result=true" >> $GITHUB_OUTPUT
          echo "script_failed=false" >> $GITHUB_OUTPUT
          head -20 /tmp/output.log
        fi

    - name: Send Telegram notification
      if: steps.run_script.outputs.has_result == 'true'
      working-directory: ${{ github.workspace }}
      env:
        BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TITLE: ${{ steps.task.outputs.title }}
        RUN_TIME: ${{ github.run_started_at }}
        OUTPUT_FILE: /tmp/output.log
        ACTION: send
      run: python3 .github/scripts/send_telegram.py

    - name: Send no-output notification
      if: steps.run_script.outputs.has_result == 'false' && steps.run_script.outputs.script_failed == 'false'
      working-directory: ${{ github.workspace }}
      env:
        BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TITLE: ${{ steps.task.outputs.title }}
        RUN_TIME: ${{ github.run_started_at }}
      run: |
        python3 -c "
        import os, sys
        sys.path.insert(0, 'strategies/overnight_8step')
        os.environ['TELEGRAM_BOT_TOKEN'] = os.environ['BOT_TOKEN']
        os.environ['TELEGRAM_CHAT_ID'] = os.environ['CHAT_ID']
        from notifyTelegram import send_message
        msg = f\"📊 {os.environ['TITLE']}\\n\"
        msg += f\" {os.environ['RUN_TIME']}\\n\"
        msg += f\"{'='*40}\\n\\n\"
        msg += '⚠️ 脚本运行成功但无输出内容\\n'
        msg += '可能原因：\\n'
        msg += '• 当前无符合条件的标的\\n'
        msg += '• 市场整体低迷，暂无推荐\\n'
        msg += '• 空仓也是仓位，保持观望'
        send_message(msg)
        "

    - name: Handle script failure
      if: failure()
      working-directory: ${{ github.workspace }}
      env:
        BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TITLE: ${{ steps.task.outputs.title }}
        RUN_TIME: ${{ github.run_started_at }}
        ACTION: error
      run: python3 .github/scripts/send_telegram.py
