name: Daily Stock Pick & Sell Signals

on:
  schedule:
    - cron: '30 6 * * 1-5'   # 北京时间 14:30 盘中初筛
    - cron: '5 7 * * 1-5'    # 北京时间 15:05 盘后定稿
    - cron: '25 1 * * 1-5'   # 北京时间 09:25 卖出决策
    - cron: '0 2 * * 1-5'    # 北京时间 10:00 盘中跟踪
    - cron: '30 2 * * 1-5'   # 北京时间 10:30 盘中跟踪
    - cron: '0 5 * * 1-5'    # 北京时间 13:00 盘中跟踪
    - cron: '30 5 * * 1-5'   # 北京时间 13:30 盘中跟踪
    - cron: '0 6 * * 1-5'    # 北京时间 14:00 盘中跟踪
  workflow_dispatch:         # 允许手动触发

env:
  PYTHON_VERSION: '3.9'
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  stock-pick:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas numpy baostock

    - name: Determine task type
      id: task
      run: |
        # 获取当前 UTC 时间的小时和分钟
        CURRENT_HOUR=$(date -u +%H)
        CURRENT_MIN=$(date -u +%M)
        CURRENT_TIME="${CURRENT_HOUR}${CURRENT_MIN}"

        # 判断任务类型
        if [[ "$CURRENT_TIME" == "0630" ]]; then
          echo "type=pick" >> $GITHUB_OUTPUT
          echo "title=盘中初筛 - 候选清单" >> $GITHUB_OUTPUT
          echo "script=zuiyou.py" >> $GITHUB_OUTPUT
        elif [[ "$CURRENT_TIME" == "0705" ]]; then
          echo "type=pick_final" >> $GITHUB_OUTPUT
          echo "title=盘后定稿 - 最终决策" >> $GITHUB_OUTPUT
          echo "script=zuiyou.py" >> $GITHUB_OUTPUT
        else
          echo "type=sell" >> $GITHUB_OUTPUT
          echo "title=卖出决策 / 盘中跟踪" >> $GITHUB_OUTPUT
          echo "script=sell_new.py" >> $GITHUB_OUTPUT
        fi

        echo "运行时间: $(date -u '+%Y-%m-%d %H:%M UTC')"
        echo "任务类型: ${{ steps.task.outputs.title }}"

    - name: Run stock pick script
      id: run_script
      run: |
        cd recommend/xuangu
        
        # 运行选股脚本并捕获输出
        python ${{ steps.task.outputs.script }} 2>&1 | tee /tmp/output.log
        
        # 检查是否有输出
        if [ ! -s /tmp/output.log ]; then
          echo "脚本无输出，可能非交易时间"
          echo "has_result=false" >> $GITHUB_OUTPUT
        else
          echo "has_result=true" >> $GITHUB_OUTPUT
        fi

    - name: Send Telegram notification
      if: steps.run_script.outputs.has_result == 'true'
      run: |
        # 读取输出内容
        OUTPUT=$(cat /tmp/output.log)
        
        # 截取前 4000 字符（Telegram 消息限制）
        MESSAGE="${{ steps.task.outputs.title }}
        
运行时间: $(date -u '+%Y-%m-%d %H:%M UTC')

${OUTPUT}"

        # 如果消息太长，截取
        if [ ${#MESSAGE} -gt 4000 ]; then
          MESSAGE="${MESSAGE:0:3997}..."
        fi

        # 发送到 Telegram
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=${MESSAGE}" \
          -d "parse_mode=Markdown" \
          -d "disable_web_page_preview=true"

    - name: Handle script failure
      if: failure()
      run: |
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=⚠️ 选股任务执行失败
        
时间: $(date -u '+%Y-%m-%d %H:%M UTC')
任务: ${{ steps.task.outputs.title }}

请检查 GitHub Actions 日志获取详细错误信息。"
