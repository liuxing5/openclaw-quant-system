name: Full Strategy Test

on:
  workflow_dispatch:

jobs:
  test-full:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas numpy baostock python-dotenv tqdm psycopg2-binary loguru

    - name: Run full strategy test
      working-directory: strategies/overnight_8step
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        POSTGRES_HOST: ${{ secrets.SUPABASE_HOST }}
        POSTGRES_PORT: ${{ secrets.SUPABASE_PORT }}
        POSTGRES_USER: ${{ secrets.SUPABASE_USER }}
        POSTGRES_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
        POSTGRES_DB: ${{ secrets.SUPABASE_DB }}
      run: |
        echo "🧪 Running full strategy test..."
        python test_full.py
