name: llm_multisource

on:
  push:
    branches: [master]
    paths:
      - 'strategies/llm_multisource/**'
      - '.github/workflows/llm_multisource.yml'
  schedule:
    - cron: '30 0 * * 1-5'
    - cron: '30 3 * * 1-5'
    - cron: '30 7 * * 1-5'
  workflow_dispatch:
    inputs:
      run_mode:
        description: '运行模式'
        required: false
        default: 'morning'
        type: choice
        options:
          - morning
          - intraday
          - afternoon

jobs:
  recommend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    env:
      # 数据库（持久化）
      POSTGRES_HOST: ${{ secrets.SUPABASE_HOST }}
      POSTGRES_PORT: ${{ secrets.SUPABASE_PORT }}
      POSTGRES_USER: ${{ secrets.SUPABASE_USER }}
      POSTGRES_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
      POSTGRES_DB: ${{ secrets.SUPABASE_DB }}
      # LLM
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
      LLM_MODEL: ${{ secrets.LLM_MODEL }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
      DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
      # Telegram
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      TZ: Asia/Shanghai
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Determine run mode
        id: mode
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" -lt 2 ]; then
            echo "mode=morning" >> $GITHUB_OUTPUT
            echo "盘前模式 (UTC ${HOUR}:30 = 北京时间 08:30)"
          elif [ "$HOUR" -lt 7 ]; then
            echo "mode=intraday" >> $GITHUB_OUTPUT
            echo "盘中模式 (UTC ${HOUR}:30 = 北京时间 $((HOUR+8)):30)"
          else
            echo "mode=afternoon" >> $GITHUB_OUTPUT
            echo "盘后模式 (UTC ${HOUR}:30 = 北京时间 $((HOUR+8)):30)"
          fi
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: pip install -r strategies/llm_multisource/requirements.txt

      - name: Setup & collect
        run: |
          python -m core.db.apply_schema
          python strategies/llm_multisource/seed_sources.py
          python strategies/llm_multisource/sync_stock_info.py

      - name: Collect market data
        run: |
          python -m core.market_data.quotes
          python strategies/llm_multisource/collector.py --once

      - name: Fast path extraction (structured data)
        run: python strategies/llm_multisource/structured_extraction.py

      - name: Extract signals with LLM (news + research only)
        run: python strategies/llm_multisource/extractor.py --once

      - name: Aggregate & report
        env:
          RUN_MODE: ${{ steps.mode.outputs.mode }}
        run: |
          python strategies/llm_multisource/aggregate.py
          python -m core.tracker.performance
          python strategies/llm_multisource/generate_report.py
          python -m core.notify.pusher

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.GH_PAT }}
          publish_dir: ./strategies/llm_multisource/docs
          keep_files: true
