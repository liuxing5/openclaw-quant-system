name: Telegram Command Handler

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Telegram command'
        required: true
        type: string
      args:
        description: 'Command arguments'
        required: false
        type: string
        default: ''
      chat_id:
        description: 'Telegram chat ID'
        required: true
        type: string

jobs:
  handle-command:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install requests baostock pandas

    - name: Execute command
      id: execute
      working-directory: recommend/xuangu
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        COMMAND: ${{ github.event.inputs.command }}
        ARGS: ${{ github.event.inputs.args }}
        CHAT_ID: ${{ github.event.inputs.chat_id }}
      run: |
        python3 -c "
        import os
        import sys
        sys.path.insert(0, '.')
        from position_manager import handle_command, format_positions, add_position, remove_position

        command = os.environ.get('COMMAND', '')
        args = os.environ.get('ARGS', '')
        chat_id = os.environ.get('CHAT_ID', '')

        print(f'执行命令: /{command} {args}')

        # 执行命令
        if command in ['positions', 'list']:
            result = format_positions()
        elif command == 'add':
            result = handle_command('add', args)
        elif command in ['remove', 'del', 'delete']:
            result = handle_command('remove', args)
        elif command == 'help':
            result = handle_command('help')
        else:
            result = f'❌ 未知命令: /{command}'

        print(f'结果: {result}')

        # 发送结果到 Telegram
        import requests
        token = os.environ.get('TELEGRAM_BOT_TOKEN', '')
        if token and chat_id:
            url = f'https://api.telegram.org/bot{token}/sendMessage'
            payload = {
                'chat_id': chat_id,
                'text': result,
                'parse_mode': 'Markdown',
            }
            resp = requests.post(url, json=payload, timeout=10)
            print(f'Telegram 发送状态: {resp.status_code}')
        "

    - name: Send error notification
      if: failure()
      working-directory: .github/scripts
      env:
        BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TITLE: "Telegram 命令执行失败"
        RUN_TIME: ${{ github.event.inputs.command }}
      run: |
        python3 send_telegram.py
