name: Test Telegram Push

on:
  workflow_dispatch:

jobs:
  test-push:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Install dependencies
      run: pip install requests

    - name: Send test message
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python3 -c """
        import os
        import requests
        
        token = os.environ.get('TELEGRAM_BOT_TOKEN')
        chat_id = os.environ.get('TELEGRAM_CHAT_ID')
        
        if not token or not chat_id:
            print('Error: Missing configuration')
            exit(1)
        
        msg = '🔥 zuiyou1 v1.5 测试推送\\n'
        msg += '📅 2026-05-09\\n'
        msg += '📊 情绪: 正常 (68分) | 涨停: 58家\\n'
        msg += '\\n'
        msg += '━━ 稳健路径 (3只) 单票≤15% ━━\\n'
        msg += '🤖 LLM候选（盘后多源信号共振）:\\n'
        msg += '  • sh.600519 🤖 ¥1700.0 +3.50% 量比2.10 换手5.2% 得分85\\n'
        msg += '  • sz.300750 🤖 ¥178.8 +5.80% 量比3.20 换手7.8% 得分88\\n'
        msg += '\\n'
        msg += '🔮 八步法精选（盘中量能独立发现）:\\n'
        msg += '  • sz.002594 ¥185.5 +4.20% 量比2.80 换手6.5% 得分82\\n'
        msg += '\\n'
        msg += '━━ 高位路径 (2只) 单票≤8% ━━\\n'
        msg += '🤖 LLM候选（盘后多源信号共振）:\\n'
        msg += '  • sh.688167 🤖 ¥420.0 +7.20% 量比4.50 换手9.2% 得分79\\n'
        msg += '\\n'
        msg += '🔮 八步法精选（盘中量能独立发现）:\\n'
        msg += '  • sz.301171 ¥45.6 +8.50% 量比5.10 换手8.8% 得分76\\n'
        msg += '\\n'
        msg += '━━ 操作建议 ━━\\n'
        msg += '单票仓位≤15%(稳健)/8%(高位)\\n'
        msg += '✅ 测试完成 - LLM候选和八步法自有标的已区分显示'
        
        url = 'https://api.telegram.org/bot' + token + '/sendMessage'
        params = {'chat_id': chat_id, 'text': msg}
        
        try:
            response = requests.post(url, params=params, timeout=10)
            if response.ok:
                print('Success: Message sent')
            else:
                print('Error:', response.text)
        except Exception as e:
            print('Exception:', e)
        """
