name: Telegram Bot Polling

on:
  schedule:
    # 每 5 分钟一次（之前 1 分钟一次会烧穿 GHA 配额并淹没 master）
    # 限定北京时间 9-15 时段（UTC 1-7），限工作日 1-5
    # cron 写多个区间是因为 GitHub cron 不支持 hour 区间 + 分钟步进
    - cron: '*/5 1-7 * * 1-5'
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/telegram-bot.yml'
      - '.github/scripts/telegram_bot_poll.py'

jobs:
  poll-telegram:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: pip install requests python-dotenv

    - name: Poll Telegram and handle commands
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python3 .github/scripts/telegram_bot_poll.py
