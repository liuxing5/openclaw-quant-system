name: Telegram Bot Polling

on:
  schedule:
    # 每分钟检查一次新消息
    - cron: '* * * * *'
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/telegram-bot.yml'

jobs:
  poll-telegram:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install requests python-dotenv

    - name: Poll Telegram and handle commands
      working-directory: strategies/overnight_8step
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python3 - << 'PYTHON_SCRIPT'
        import os
        import sys
        import json
        import requests
        from datetime import datetime

        sys.path.insert(0, '.')

        BOT_TOKEN = os.environ.get('TELEGRAM_BOT_TOKEN', '')
        CHAT_ID = os.environ.get('TELEGRAM_CHAT_ID', '')
        GITHUB_TOKEN = os.environ.get('GITHUB_TOKEN', '')
        REPO = os.environ.get('GITHUB_REPOSITORY', '')

        if not BOT_TOKEN:
            print('未配置 TELEGRAM_BOT_TOKEN')
            sys.exit(0)

        API_BASE = f'https://api.telegram.org/bot{BOT_TOKEN}'
        GH_API = f'https://api.github.com/repos/{REPO}/contents'
        GH_HEADERS = {
            'Authorization': f'token {GITHUB_TOKEN}',
            'Accept': 'application/vnd.github.v3+json',
        }

        STATE_PATH = 'strategies/overnight_8step/telegram_state.json'
        POSITIONS_PATH = 'strategies/overnight_8step/positions.json'

        # ========== 1. 从 GitHub API 读取上次状态 ==========
        last_update_id = 0
        try:
            resp = requests.get(f'{GH_API}/{STATE_PATH}', headers=GH_HEADERS, timeout=10)
            if resp.status_code == 200:
                import base64
                content = base64.b64decode(resp.json()['content']).decode()
                state = json.loads(content)
                last_update_id = state.get('last_update_id', 0)
                print(f'从 GitHub API 读取状态: last_update_id={last_update_id}')
            else:
                print(f'状态文件不存在 (首次运行), HTTP {resp.status_code}')
        except Exception as e:
            print(f'读取状态文件异常: {e}')

        # ========== 2. 获取 Telegram 新消息 ==========
        params = {
            'offset': last_update_id + 1,
            'limit': 20,
            'timeout': 0,
        }
        resp = requests.get(f'{API_BASE}/getUpdates', params=params, timeout=15)
        if resp.status_code != 200:
            print(f'getUpdates 失败: {resp.status_code} {resp.text}')
            sys.exit(0)

        data = resp.json()
        if not data.get('ok'):
            print(f'API 错误: {data}')
            sys.exit(0)

        updates = data.get('result', [])
        if not updates:
            print('无新消息')
            sys.exit(0)

        print(f'收到 {len(updates)} 条新消息')

        # ========== 3. 处理命令 ==========
        from position_manager import handle_command, format_positions

        positions_changed = False

        for update in updates:
            update_id = update.get('update_id', 0)
            message = update.get('message', {})
            if not message:
                continue

            chat_id = str(message.get('chat', {}).get('id', ''))
            text = message.get('text', '')

            if CHAT_ID and chat_id != CHAT_ID:
                print(f'忽略未授权用户: {chat_id}')
                continue

            if not text or not text.startswith('/'):
                print(f'忽略非命令: {text[:50]}')
                continue

            parts = text[1:].split()
            command = parts[0].lower()
            args = ' '.join(parts[1:]) if len(parts) > 1 else ''

            print(f'执行命令: /{command} args="{args}"')

            if command in ['positions', 'list']:
                result = format_positions()
            elif command == 'add':
                result = handle_command('add', args)
                positions_changed = True
            elif command in ['remove', 'del', 'delete']:
                result = handle_command('remove', args)
                positions_changed = True
            elif command == 'help':
                result = handle_command('help')
            elif command == 'start':
                result = '👋 欢迎使用 OpenClaw 量化交易系统\n\n📊 可用命令：\n/positions 或 /list  - 查看当前持仓\n/add <代码> <成本> [路径]  - 添加持仓\n/remove <代码>  - 删除持仓\n/help  - 显示帮助'
            else:
                result = f'❌ 未知命令: /{command}\n输入 /help 查看可用命令'

            # 发送回复
            send_resp = requests.post(
                f'{API_BASE}/sendMessage',
                json={'chat_id': chat_id, 'text': result},
                timeout=10,
            )
            print(f'回复结果: {send_resp.status_code}')
            if send_resp.status_code != 200:
                print(f'回复失败: {send_resp.text}')

            last_update_id = max(last_update_id, update_id)

        # ========== 4. 保存状态到 GitHub ==========
        def save_to_github(file_path, content_str, commit_msg):
            """通过 GitHub API 保存文件"""
            import base64
            encoded = base64.b64encode(content_str.encode()).decode()

            # 获取当前 SHA
            sha = ''
            try:
                r = requests.get(f'{GH_API}/{file_path}', headers=GH_HEADERS, timeout=10)
                if r.status_code == 200:
                    sha = r.json().get('sha', '')
            except Exception as e:
                print(f'获取 SHA 失败: {e}')

            payload = {
                'message': commit_msg,
                'content': encoded,
                'branch': 'master',
            }
            if sha:
                payload['sha'] = sha

            r = requests.put(f'{GH_API}/{file_path}', json=payload, headers=GH_HEADERS, timeout=15)
            print(f'保存 {file_path}: HTTP {r.status_code}')
            if r.status_code not in (200, 201):
                print(f'  响应: {r.text}')
            return r.status_code

        # 4a. 保存 telegram_state.json
        if last_update_id > 0:
            state_content = json.dumps({'last_update_id': last_update_id}, indent=2)
            save_to_github(STATE_PATH, state_content, 'chore: update telegram bot state')

        # 4b. 如果 positions 有变更，保存 positions.json
        if positions_changed:
            try:
                with open('positions.json', 'r', encoding='utf-8') as f:
                    positions_content = f.read()
                save_to_github(POSITIONS_PATH, positions_content, 'chore: update positions via telegram')
            except Exception as e:
                print(f'读取 positions.json 失败: {e}')

        print('处理完成')
        PYTHON_SCRIPT
