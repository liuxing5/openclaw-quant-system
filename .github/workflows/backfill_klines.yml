name: 历史K线回填

on:
  workflow_dispatch:
    inputs:
      days:
        description: '回填天数（默认 350）'
        required: false
        default: '350'
      limit:
        description: '限制股票数（0=全量，调试用）'
        required: false
        default: '0'

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      POSTGRES_HOST: ${{ secrets.SUPABASE_HOST }}
      POSTGRES_PORT: ${{ secrets.SUPABASE_PORT }}
      POSTGRES_USER: ${{ secrets.SUPABASE_USER }}
      POSTGRES_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
      POSTGRES_DB: ${{ secrets.SUPABASE_DB }}
      POSTGRES_SSLMODE: require

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install baostock

      - name: Run backfill
        run: |
          python strategies/funnel_strategy/backfill_klines.py \
            --days ${{ inputs.days }} \
            --limit ${{ inputs.limit }} \
            --batch 500 \
            --sleep 0.06
