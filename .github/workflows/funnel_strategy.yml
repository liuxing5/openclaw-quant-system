name: funnel_strategy

on:
  push:
    branches: [master]
    paths:
      - 'strategies/funnel_strategy/**'
      - 'core/**'
      - '.github/workflows/funnel_strategy.yml'
  schedule:
    - cron: '10 7 * * 1-5'  # UTC 7:10 = 北京时间 15:10
  workflow_dispatch:
    inputs:
      date:
        description: '交易日期 (YYYY-MM-DD)，留空=最新'
        required: false
      skip_layers:
        description: '跳过的层级 (逗号分隔, 例如: 0,3)'
        required: false

jobs:
  funnel:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      POSTGRES_HOST: ${{ secrets.SUPABASE_HOST }}
      POSTGRES_PORT: ${{ secrets.SUPABASE_PORT }}
      POSTGRES_USER: ${{ secrets.SUPABASE_USER }}
      POSTGRES_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
      POSTGRES_DB: ${{ secrets.SUPABASE_DB }}
      POSTGRES_SSLMODE: require
      TZ: Asia/Shanghai
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Apply DB schema migrations
        env:
          POSTGRES_HOST: ${{ secrets.SUPABASE_HOST }}
          POSTGRES_PORT: ${{ secrets.SUPABASE_PORT }}
          POSTGRES_USER: ${{ secrets.SUPABASE_USER }}
          POSTGRES_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
          POSTGRES_DB: ${{ secrets.SUPABASE_DB }}
        run: |
          pip install psycopg2-binary python-dotenv
          python -m core.db.apply_schema || echo "⚠️ apply_schema 失败，继续执行"

      - name: Run funnel strategy
        run: |
          CMD="python -m strategies.funnel_strategy.run_funnel --output ./results"
          if [ -n "${{ inputs.date }}" ]; then
            CMD="$CMD --date ${{ inputs.date }}"
          fi
          if [ -n "${{ inputs.skip_layers }}" ]; then
            for layer in $(echo "${{ inputs.skip_layers }}" | tr ',' ' '); do
              CMD="$CMD --disable $layer"
            done
          fi
          echo "Running: $CMD"
          $CMD 2>&1 | tee /tmp/funnel_output.log
          echo "EXIT_CODE=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: Generate HTML report
        run: |
          CMD="python strategies/funnel_strategy/generate_html.py --output ./strategies/funnel_strategy/docs"
          if [ -n "${{ inputs.date }}" ]; then
            CMD="$CMD --date ${{ inputs.date }}"
          fi
          echo "Running: $CMD"
          $CMD

      - name: Send Telegram notification
        if: always() && env.EXIT_CODE == '0'
        run: |
          pip install psycopg2-binary python-dotenv
          python .github/scripts/funnel_telegram.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.GH_PAT }}
          publish_dir: ./strategies/funnel_strategy/docs
          destination_dir: funnel
          keep_files: true

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: funnel-results
          path: results/funnel_*.csv
