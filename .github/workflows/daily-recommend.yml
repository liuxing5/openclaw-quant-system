name: Daily Stock Recommendation

on:
  schedule:
    # 北京时间 15:30 = UTC 07:30
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

jobs:
  recommend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    env:
      # 数据库（持久化）
      POSTGRES_HOST: ${{ secrets.SUPABASE_HOST }}
      POSTGRES_PORT: ${{ secrets.SUPABASE_PORT }}
      POSTGRES_USER: ${{ secrets.SUPABASE_USER }}
      POSTGRES_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
      POSTGRES_DB: ${{ secrets.SUPABASE_DB }}
      # LLM
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
      LLM_MODEL: ${{ secrets.LLM_MODEL }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
      DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
      # Telegram
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      TZ: Asia/Shanghai
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r autorecommend/requirements.txt
          pip install psycopg2-binary
      
      - name: Ensure schema (idempotent)
        run: python autorecommend/apply_schema.py
      
      - name: Seed source registry
        run: python autorecommend/seed_sources.py
      
      - name: Sync stock basic info
        run: python autorecommend/sync_stock_info.py
      
      - name: Collect market data (full A-share)
        run: python autorecommend/market_data.py
      
      - name: Collect news signals (AKShare-only mode)
        run: python autorecommend/collector.py --once
      
      - name: Extract signals with LLM
        run: python autorecommend/extractor.py --once
      
      - name: Aggregate candidates
        run: python autorecommend/aggregate.py
      
      - name: Track performance (T+1/T+5/T+20)
        run: python autorecommend/track_performance.py
      
      - name: Generate HTML report
        run: python autorecommend/generate_report.py
      
      - name: Push to Telegram
        run: python autorecommend/pusher.py
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.GH_PAT }}
          publish_dir: ./autorecommend/docs
          keep_files: true
